/* ============================ persistencia ============================ */
const STORE_KEY = "portfolio:data:v3";
const emptyData = { transactions: [], cash: [], tickers: {} };

// Historial inicial importado de Firstrade (solo se carga la primera vez)
const SEED = emptyData;

async function loadData() {
  try {
    const r = await window.storage.get(STORE_KEY);
    if (r && r.value) return { ...emptyData, ...JSON.parse(r.value) };
  } catch (e) {
    /* clave aún no existe */
  }
  // primera vez: sembramos el historial importado
  await saveData(SEED);
  return SEED;
}
async function saveData(data) {
  try {
    await window.storage.set(STORE_KEY, JSON.stringify(data));
  } catch (e) {
    console.error("No se pudo guardar:", e);
  }
}

/* ============================ utilidades ============================ */
const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
const fmtUSD = (n) =>
  (n < 0 ? "-$" : "$") +
  Math.abs(n || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtPct = (n) => (n >= 0 ? "+" : "") + (n * 100).toFixed(2) + "%";
const fmtNum = (n) => (n || 0).toLocaleString("en-US", { maximumFractionDigits: 4 });
const daysBetween = (a, b) => Math.max(0, (new Date(b) - new Date(a)) / 86400000);
const todayISO = () => new Date().toISOString().slice(0, 10);

const PIE_COLORS = ["#E2B259", "#6AA8FF", "#56C596", "#C77DFF", "#F2784B", "#5ED3E0", "#E5708B", "#9DA86A"];

const INDUSTRY_GUESS = {
  UNH: "Salud", GOOGL: "Comunicaciones", GOOG: "Comunicaciones", PYPL: "Servicios financieros",
  AMD: "Semiconductores", MRVL: "Semiconductores", INTC: "Semiconductores", NVDA: "Semiconductores",
  DLO: "Servicios financieros", AAPL: "Tecnología", MSFT: "Tecnología",
};

// parser simple de CSV con comillas
function parseCSVRows(text) {
  const rows = [];
  let row = [], field = "", q = false;
  text = text.replace(/^\uFEFF/, "");
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (q) {
      if (ch === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else q = false; }
      else field += ch;
    } else {
      if (ch === '"') q = true;
      else if (ch === ",") { row.push(field); field = ""; }
      else if (ch === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
      else if (ch !== "\r") field += ch;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter((r) => r.some((c) => c.trim() !== ""));
}

// convierte una exportación de Firstrade en { transactions, cash }
function parseFirstrade(text) {
  const rows = parseCSVRows(text);
  if (!rows.length) return { transactions: [], cash: [] };
  const head = rows[0].map((h) => h.trim().toLowerCase());
  const col = (n) => head.indexOf(n);
  const iD = col("date"), iT = col("transaction"), iQ = col("quantity"),
    iS = col("symbol"), iP = col("price"), iA = col("amount");
  const toISO = (d) => {
    const m = d.trim().split("/");
    if (m.length !== 3) return d.trim();
    return `${m[2]}-${String(+m[1]).padStart(2, "0")}-${String(+m[0]).padStart(2, "0")}`;
  };
  const transactions = [], cash = [];
  let c = 0;
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r]; c++;
    const t = (row[iT] || "").trim();
    const sym = (row[iS] || "").trim().toUpperCase();
    const qty = Math.abs(parseFloat(row[iQ]) || 0);
    const price = parseFloat(row[iP]) || 0;
    const amt = parseFloat(row[iA]) || 0;
    const date = toISO(row[iD] || "");
    const base = { id: uid(), created: Date.now() + c };
    if (t === "Bought") transactions.push({ ...base, type: "buy", ticker: sym, industry: INDUSTRY_GUESS[sym] || "", shares: qty, price, fee: Math.max(0, +(Math.abs(amt) - qty * price).toFixed(2)), date });
    else if (t === "Sold") transactions.push({ ...base, type: "sell", ticker: sym, industry: INDUSTRY_GUESS[sym] || "", shares: qty, price, fee: Math.max(0, +(qty * price - amt).toFixed(2)), date });
    else if (t === "Deposit") cash.push({ ...base, type: "deposit", amount: amt, date, note: "Importado de Firstrade" });
    else if (t === "Withdrawal") cash.push({ ...base, type: "withdrawal", amount: Math.abs(amt), date, note: "Importado de Firstrade" });
    else if (t === "Dividend") cash.push({ ...base, type: "income", amount: amt, date, note: "Dividendo " + sym });
    else if (t === "Interest") cash.push({ ...base, type: "income", amount: amt, date, note: "Interés" });
  }
  return { transactions, cash };
}

/* ============================ motor de cálculo ============================ */
function computePortfolio(data) {
  const { transactions, cash, tickers } = data;
  const now = new Date();

  // agrupar por ticker
  const byTicker = {};
  for (const t of transactions) {
    (byTicker[t.ticker] = byTicker[t.ticker] || []).push(t);
  }

  const positions = [];
  const closed = [];
  let realized = 0;
  let cashFromTrades = 0;

  for (const [ticker, txns] of Object.entries(byTicker)) {
    const sorted = [...txns].sort(
      (a, b) => new Date(a.date) - new Date(b.date) || (a.created || 0) - (b.created || 0)
    );
    let lots = [];
    for (const tx of sorted) {
      const fee = tx.fee || 0;
      if (tx.type === "buy") {
        lots.push({ shares: tx.shares, price: tx.price, date: tx.date });
        cashFromTrades -= tx.shares * tx.price + fee;
      } else {
        let toSell = tx.shares;
        cashFromTrades += tx.shares * tx.price - fee;
        while (toSell > 1e-9 && lots.length) {
          const lot = lots[0];
          const used = Math.min(lot.shares, toSell);
          realized += used * (tx.price - lot.price);
          const days = daysBetween(lot.date, tx.date);
          const cRoi = lot.price > 0 ? (tx.price - lot.price) / lot.price : 0;
          closed.push({
            id: ticker + tx.date + lot.date + used,
            ticker,
            industry: (tickers[ticker] || {}).industry || "Sin clasificar",
            shares: used,
            entryPrice: lot.price,
            exitPrice: tx.price,
            entryDate: lot.date,
            exitDate: tx.date,
            cost: used * lot.price,
            proceeds: used * tx.price,
            pl: used * (tx.price - lot.price),
            roi: cRoi,
            days,
            apr: days > 0 && lot.price > 0 ? Math.pow(tx.price / lot.price, 365 / days) - 1 : 0,
          });
          lot.shares -= used;
          toSell -= used;
          if (lot.shares <= 1e-9) lots.shift();
        }
      }
    }
    const openShares = lots.reduce((s, l) => s + l.shares, 0);
    if (openShares <= 1e-9) continue;
    const costBasis = lots.reduce((s, l) => s + l.shares * l.price, 0);
    const avgCost = costBasis / openShares;
    const weightedDays =
      lots.reduce((s, l) => s + l.shares * daysBetween(l.date, now), 0) / openShares;
    const meta = tickers[ticker] || {};
    const currentPrice = meta.price != null && meta.price !== "" ? Number(meta.price) : avgCost;
    const marketValue = openShares * currentPrice;
    const unrealized = marketValue - costBasis;
    const roi = costBasis > 0 ? unrealized / costBasis : 0;
    const apr =
      costBasis > 0 && weightedDays > 0 && marketValue > 0
        ? Math.pow(marketValue / costBasis, 365 / weightedDays) - 1
        : 0;
    positions.push({
      ticker,
      industry: meta.industry || "Sin clasificar",
      shares: openShares,
      avgCost,
      costBasis,
      currentPrice,
      marketValue,
      unrealized,
      roi,
      apr,
      weightedDays,
    });
  }
  positions.sort((a, b) => b.marketValue - a.marketValue);
  closed.sort((a, b) => new Date(b.exitDate) - new Date(a.exitDate) || (b.id < a.id ? 1 : -1));

  // efectivo — los depósitos/retiros son capital aportado; los ingresos (dividendos, interés) son ganancias
  const netDeposits = cash.reduce(
    (s, c) => s + (c.type === "deposit" ? c.amount : c.type === "withdrawal" ? -c.amount : 0),
    0
  );
  const income = cash.reduce((s, c) => s + (c.type === "income" ? c.amount : 0), 0);
  const cashBalance = netDeposits + income + cashFromTrades;
  const holdingsValue = positions.reduce((s, p) => s + p.marketValue, 0);
  const totalValue = cashBalance + holdingsValue;
  const moneyInserted = netDeposits;
  const unrealizedTotal = positions.reduce((s, p) => s + p.unrealized, 0);
  const totalROI = moneyInserted > 0 ? (totalValue - moneyInserted) / moneyInserted : 0;
  const liquidity = totalValue !== 0 ? cashBalance / totalValue : 0;

  // APR global desde el primer depósito
  const firstDate = [...cash, ...transactions]
    .map((x) => x.date)
    .sort()[0];
  const daysInvested = firstDate ? daysBetween(firstDate, now) : 0;
  const globalAPR =
    moneyInserted > 0 && daysInvested > 0 && totalValue > 0
      ? Math.pow(totalValue / moneyInserted, 365 / daysInvested) - 1
      : 0;

  // industrias
  const indMap = {};
  for (const p of positions) indMap[p.industry] = (indMap[p.industry] || 0) + p.marketValue;
  const industries = Object.entries(indMap)
    .map(([name, value]) => ({ name, value }))
    .sort((a, b) => b.value - a.value);

  // línea temporal: efectivo y capital aportado
  const events = [
    ...cash.map((c) => {
      const sign = c.type === "withdrawal" ? -1 : 1;
      const isIns = c.type === "deposit" || c.type === "withdrawal";
      return { date: c.date, created: c.created, dCash: sign * c.amount, dIns: isIns ? sign * c.amount : 0 };
    }),
    ...transactions.map((t) => ({
      date: t.date,
      created: t.created,
      dCash: t.type === "buy" ? -(t.shares * t.price + (t.fee || 0)) : t.shares * t.price - (t.fee || 0),
      dIns: 0,
    })),
  ].sort((a, b) => new Date(a.date) - new Date(b.date) || (a.created || 0) - (b.created || 0));

  let runCash = 0, runIns = 0;
  const timeline = events.map((e) => {
    runCash += e.dCash;
    runIns += e.dIns;
    return { date: e.date, cash: Number(runCash.toFixed(2)), inserted: Number(runIns.toFixed(2)) };
  });

  return {
    positions, closed, industries, timeline,
    realized, unrealizedTotal, cashBalance, holdingsValue, totalValue,
    moneyInserted, income, totalROI, globalAPR, liquidity,
  };
}

/* ============================ componentes UI ============================ */
function Card({ label, value, sub, tone = "neutral", icon: Icon }) {
  const toneColor = tone === "up" ? "var(--green)" : tone === "down" ? "var(--red)" : "var(--text)";
  return (
    <div className="card">
      <div className="card-top">
        <span className="card-label">{label}</span>
        {Icon && <Icon size={15} style={{ color: "var(--muted)" }} />}
      </div>
      <div className="card-value" style={{ color: toneColor }}>{value}</div>
      {sub && <div className="card-sub" style={{ color: toneColor }}>{sub}</div>}
    </div>
  );
}

function PieTip({ active, payload }) {
  if (!active || !payload || !payload.length) return null;
  const p = payload[0];
  return (
    <div className="tip">
      <div className="tip-title">{p.name}</div>
      <div>{fmtUSD(p.value)}</div>
    </div>
  );
}
function GenericTip({ active, payload, label, fmt }) {
  if (!active || !payload || !payload.length) return null;
  return (
    <div className="tip">
      {label && <div className="tip-title">{label}</div>}
      {payload.map((p, i) => (
        <div key={i} style={{ color: p.color }}>{p.name}: {fmt ? fmt(p.value) : p.value}</div>
      ))}
    </div>
  );
}

/* ============================ app principal ============================ */
function App() {
  const [data, setData] = useState(emptyData);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("Resumen");

  useEffect(() => {
    loadData().then((d) => { setData(d); setLoading(false); });
  }, []);

  const update = (next) => { setData(next); saveData(next); };
  const p = useMemo(() => computePortfolio(data), [data]);

  /* ---- acciones ---- */
  const addTxn = (tx) => {
    const next = {
      ...data,
      transactions: [...data.transactions, { ...tx, id: uid(), created: Date.now() }],
      tickers: { ...data.tickers },
    };
    const cur = next.tickers[tx.ticker] || {};
    next.tickers[tx.ticker] = {
      industry: tx.industry || cur.industry || "Sin clasificar",
      price: cur.price != null && cur.price !== "" ? cur.price : tx.price,
    };
    update(next);
  };
  const delTxn = (id) => update({ ...data, transactions: data.transactions.filter((t) => t.id !== id) });
  const addCash = (c) => update({ ...data, cash: [...data.cash, { ...c, id: uid(), created: Date.now() }] });
  const delCash = (id) => update({ ...data, cash: data.cash.filter((c) => c.id !== id) });
  const setTicker = (ticker, field, value) =>
    update({ ...data, tickers: { ...data.tickers, [ticker]: { ...(data.tickers[ticker] || {}), [field]: value } } });
  const resetAll = () => { if (confirm("¿Borrar TODOS los datos? Esto no se puede deshacer.")) update(emptyData); };
  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "mi_cartera.json";
    a.click();
  };
  const importFirstrade = (text) => {
    const parsed = parseFirstrade(text);
    const sigT = new Set(data.transactions.map((t) => `${t.type}|${t.ticker}|${t.date}|${t.shares}|${t.price}`));
    const sigC = new Set(data.cash.map((c) => `${c.type}|${c.date}|${c.amount}|${c.note}`));
    const newT = parsed.transactions.filter((t) => !sigT.has(`${t.type}|${t.ticker}|${t.date}|${t.shares}|${t.price}`));
    const newC = parsed.cash.filter((c) => !sigC.has(`${c.type}|${c.date}|${c.amount}|${c.note}`));
    const tickers = { ...data.tickers };
    for (const t of newT) {
      const cur = tickers[t.ticker] || {};
      tickers[t.ticker] = { industry: cur.industry || t.industry || "Sin clasificar", price: cur.price ?? "" };
    }
    update({ transactions: [...data.transactions, ...newT], cash: [...data.cash, ...newC], tickers });
    alert(`Importado: ${newT.length} operaciones y ${newC.length} movimientos de efectivo nuevos.${newT.length + newC.length === 0 ? " (Todo estaba ya cargado.)" : ""}`);
  };

  if (loading) return <div className="app"><div className="loading">Cargando tu cartera…</div><style>{CSS}</style></div>;

  const tabs = ["Resumen", "Posiciones", "Cerradas", "Operaciones", "Efectivo", "Ajustes"];

  return (
    <div className="app">
      <style>{CSS}</style>

      <header className="header">
        <div>
          <h1>Mi Cartera</h1>
          <p className="sub">Registro manual · Firstrade · USD</p>
        </div>
        <div className="total-block">
          <span className="card-label">Valor total</span>
          <span className="total-value">{fmtUSD(p.totalValue)}</span>
          <span style={{ color: p.totalROI >= 0 ? "var(--green)" : "var(--red)", fontSize: 13 }}>
            {fmtPct(p.totalROI)} sobre capital aportado
          </span>
        </div>
      </header>

      <nav className="tabs">
        {tabs.map((t) => (
          <button key={t} className={"tab" + (tab === t ? " active" : "")} onClick={() => setTab(t)}>{t}</button>
        ))}
      </nav>

      {tab === "Resumen" && <Resumen p={p} />}
      {tab === "Posiciones" && <Posiciones p={p} setTicker={setTicker} />}
      {tab === "Cerradas" && <Cerradas p={p} />}
      {tab === "Operaciones" && <Operaciones data={data} p={p} addTxn={addTxn} delTxn={delTxn} />}
      {tab === "Efectivo" && <Efectivo data={data} addCash={addCash} delCash={delCash} />}
      {tab === "Ajustes" && (
        <Ajustes data={data} setTicker={setTicker} resetAll={resetAll} exportJSON={exportJSON} importFirstrade={importFirstrade} />
      )}
    </div>
  );
}

/* ============================ pestaña: Resumen ============================ */
function Resumen({ p }) {
  const empty = p.positions.length === 0 && p.moneyInserted === 0;
  if (empty)
    return (
      <div className="empty">
        <BarChart3 size={32} style={{ color: "var(--gold)" }} />
        <h3>Aún no hay datos</h3>
        <p>Empieza en <b>Efectivo</b> registrando lo que depositaste, y luego en <b>Operaciones</b> añade tus compras y ventas.</p>
      </div>
    );

  return (
    <div className="content">
      <div className="cards">
        <Card label="Capital aportado" value={fmtUSD(p.moneyInserted)} icon={PiggyBank} />
        <Card label="Efectivo disponible" value={fmtUSD(p.cashBalance)} icon={Wallet} />
        <Card label="Valor invertido" value={fmtUSD(p.holdingsValue)} icon={Layers} />
        <Card label="P/L no realizado" value={fmtUSD(p.unrealizedTotal)} sub={fmtPct(p.holdingsValue ? p.unrealizedTotal / (p.holdingsValue - p.unrealizedTotal) : 0)} tone={p.unrealizedTotal >= 0 ? "up" : "down"} icon={p.unrealizedTotal >= 0 ? TrendingUp : TrendingDown} />

        <Card label="ROI total" value={fmtPct(p.totalROI)} tone={p.totalROI >= 0 ? "up" : "down"} icon={p.totalROI >= 0 ? TrendingUp : TrendingDown} />
        <Card label="APR (anualizado)" value={fmtPct(p.globalAPR)} tone={p.globalAPR >= 0 ? "up" : "down"} icon={TrendingUp} />

      <div className="charts">
        <div className="panel">
          <h3 className="panel-title">Distribución por industria</h3>
          {p.industries.length ? (
            <ResponsiveContainer width="100%" height={260}>
              <PieChart>
                <Pie data={p.industries} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={55} outerRadius={95} paddingAngle={2} stroke="none">
                  {p.industries.map((_, i) => <Cell key={i} fill={PIE_COLORS[i % PIE_COLORS.length]} />)}
                </Pie>
                <Tooltip content={<PieTip />} />
                <Legend verticalAlign="bottom" height={36} wrapperStyle={{ fontSize: 12, color: "var(--muted)" }} />
              </PieChart>
            </ResponsiveContainer>
          ) : <div className="mini-empty">Sin posiciones abiertas.</div>}
        </div>

        <div className="panel">
          <h3 className="panel-title">ROI por posición</h3>
          {p.positions.length ? (
            <ResponsiveContainer width="100%" height={260}>
              <BarChart data={p.positions.map((x) => ({ name: x.ticker, roi: Number((x.roi * 100).toFixed(2)) }))} margin={{ top: 10, right: 10, left: -10, bottom: 0 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" vertical={false} />
                <XAxis dataKey="name" tick={{ fill: "var(--muted)", fontSize: 11 }} axisLine={{ stroke: "var(--border)" }} tickLine={false} />
                <YAxis tick={{ fill: "var(--muted)", fontSize: 11 }} axisLine={false} tickLine={false} unit="%" />
                <Tooltip content={<GenericTip fmt={(v) => v + "%"} />} cursor={{ fill: "rgba(255,255,255,0.04)" }} />
                <Bar dataKey="roi" radius={[4, 4, 0, 0]}>
                  {p.positions.map((x, i) => <Cell key={i} fill={x.roi >= 0 ? "var(--green)" : "var(--red)"} />)}

              </BarChart>
            </ResponsiveContainer>
          ) : <div className="mini-empty">Sin posiciones abiertas.</div>}
        </div>

        <div className="panel wide">
          <h3 className="panel-title">Efectivo y capital aportado en el tiempo</h3>
          {p.timeline.length ? (
            <ResponsiveContainer width="100%" height={260}>
              <AreaChart data={p.timeline} margin={{ top: 10, right: 10, left: -10, bottom: 0 }}>
                <defs>
                  <linearGradient id="gIns" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor="#6AA8FF" stopOpacity={0.5} />
                    <stop offset="100%" stopColor="#6AA8FF" stopOpacity={0} />
                  </linearGradient>
                  <linearGradient id="gCash" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor="#E2B259" stopOpacity={0.5} />
                    <stop offset="100%" stopColor="#E2B259" stopOpacity={0} />
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" vertical={false} />
                <XAxis dataKey="date" tick={{ fill: "var(--muted)", fontSize: 11 }} axisLine={{ stroke: "var(--border)" }} tickLine={false} />
                <YAxis tick={{ fill: "var(--muted)", fontSize: 11 }} axisLine={false} tickLine={false} tickFormatter={(v) => "$" + (v / 1000).toFixed(0) + "k"} />
                <Tooltip content={<GenericTip fmt={fmtUSD} />} />
                <Legend wrapperStyle={{ fontSize: 12 }} />
                <Area type="monotone" dataKey="inserted" name="Capital aportado" stroke="#6AA8FF" fill="url(#gIns)" strokeWidth={2} />
                <Area type="monotone" dataKey="cash" name="Efectivo disponible" stroke="#E2B259" fill="url(#gCash)" strokeWidth={2} />
              </AreaChart>
            </ResponsiveContainer>
          ) : <div className="mini-empty">Registra movimientos de efectivo para ver la evolución.</div>}
        </div>
      </div>

}

/* ============================ pestaña: Posiciones ============================ */
function Posiciones({ p, setTicker }) {
  if (!p.positions.length)
    return <div className="empty"><Layers size={32} style={{ color: "var(--gold)" }} /><h3>Sin posiciones abiertas</h3><p>Añade compras en <b>Operaciones</b>.</p></div>;
  return (
    <div className="content">
      <div className="panel">
        <h3 className="panel-title">Posiciones abiertas · edita el precio actual para actualizar valores</h3>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Ticker</th><th>Industria</th><th className="r">Acciones</th><th className="r">Coste medio</th>
                <th className="r">Precio actual</th><th className="r">Valor</th><th className="r">P/L</th><th className="r">ROI</th><th className="r">APR</th>
              </tr>
            </thead>
            <tbody>
              {p.positions.map((x) => (
                <tr key={x.ticker}>
                  <td className="mono b">{x.ticker}</td>
                  <td><span className="chip">{x.industry}</span></td>
                  <td className="r mono">{fmtNum(x.shares)}</td>
                  <td className="r mono">{fmtUSD(x.avgCost)}</td>
                  <td className="r">
                    <input className="price-input mono" type="number" step="0.01" defaultValue={x.currentPrice.toFixed(2)}
                      onBlur={(e) => setTicker(x.ticker, "price", e.target.value === "" ? "" : Number(e.target.value))} />
                  </td>
                  <td className="r mono">{fmtUSD(x.marketValue)}</td>
                  <td className="r mono" style={{ color: x.unrealized >= 0 ? "var(--green)" : "var(--red)" }}>{fmtUSD(x.unrealized)}</td>
                  <td className="r mono" style={{ color: x.roi >= 0 ? "var(--green)" : "var(--red)" }}>{fmtPct(x.roi)}</td>
                  <td className="r mono" style={{ color: x.apr >= 0 ? "var(--green)" : "var(--red)" }}>{fmtPct(x.apr)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ============================ pestaña: Cerradas ============================ */
function Cerradas({ p }) {
  const c = p.closed;
  if (!c.length)
    return <div className="empty"><TrendingUp size={32} style={{ color: "var(--gold)" }} /><h3>Sin posiciones cerradas</h3><p>Cuando vendas acciones, cada cierre aparecerá aquí con su ganancia y rendimiento.</p></div>;

  const totalPL = c.reduce((s, x) => s + x.pl, 0);
  const totalCost = c.reduce((s, x) => s + x.cost, 0);
  const wins = c.filter((x) => x.pl > 0).length;
  const winRate = c.length ? wins / c.length : 0;
  const best = c.reduce((a, b) => (b.roi > a.roi ? b : a), c[0]);
  const worst = c.reduce((a, b) => (b.roi < a.roi ? b : a), c[0]);

  return (
    <div className="content">
      <div className="cards">
        <Card label="P/L realizado total" value={fmtUSD(totalPL)} tone={totalPL >= 0 ? "up" : "down"} icon={totalPL >= 0 ? TrendingUp : TrendingDown} />
        <Card label="ROI sobre cerradas" value={fmtPct(totalCost ? totalPL / totalCost : 0)} tone={totalPL >= 0 ? "up" : "down"} icon={BarChart3} />
        <Card label="Operaciones cerradas" value={String(c.length)} icon={Layers} />
        <Card label="% ganadoras" value={(winRate * 100).toFixed(0) + "%"} sub={wins + " de " + c.length} tone={winRate >= 0.5 ? "up" : "down"} />
        <Card label="Mejor operación" value={best.ticker} sub={fmtPct(best.roi)} tone="up" />
        <Card label="Peor operación" value={worst.ticker} sub={fmtPct(worst.roi)} tone={worst.roi >= 0 ? "up" : "down"} />
      </div>

      <div className="panel">
        <h3 className="panel-title">Histórico de posiciones cerradas (método FIFO)</h3>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Cierre</th><th>Ticker</th><th className="r">Acciones</th><th className="r">Entrada</th>
                <th className="r">Salida</th><th className="r">Días</th><th className="r">P/L</th><th className="r">ROI</th><th className="r">APR</th>
              </tr>
            </thead>
            <tbody>
              {c.map((x) => (
                <tr key={x.id}>
                  <td className="mono">{x.exitDate}</td>
                  <td className="mono b">{x.ticker}</td>
                  <td className="r mono">{fmtNum(x.shares)}</td>
                  <td className="r mono">{fmtUSD(x.entryPrice)}</td>
                  <td className="r mono">{fmtUSD(x.exitPrice)}</td>
                  <td className="r mono" style={{ color: "var(--muted)" }}>{Math.round(x.days)}</td>
                  <td className="r mono" style={{ color: x.pl >= 0 ? "var(--green)" : "var(--red)" }}>{fmtUSD(x.pl)}</td>
                  <td className="r mono" style={{ color: x.roi >= 0 ? "var(--green)" : "var(--red)" }}>{fmtPct(x.roi)}</td>
                  <td className="r mono" style={{ color: x.apr >= 0 ? "var(--green)" : "var(--red)" }}>{fmtPct(x.apr)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <p style={{ color: "var(--muted)", fontSize: 12, marginTop: 12 }}>
          Cada fila es un lote vendido emparejado con su compra más antigua (FIFO). Si vendiste en partes, verás varias filas para el mismo ticker.
        </p>
      </div>
    </div>
  );
}

/* ============================ pestaña: Operaciones ============================ */
function Operaciones({ data, p, addTxn, delTxn }) {
  const [f, setF] = useState({ type: "buy", ticker: "", industry: "", shares: "", price: "", fee: "", date: todayISO() });
  const set = (k, v) => setF((s) => ({ ...s, [k]: v }));
  const submit = () => {
    if (!f.ticker || !f.shares || !f.price) return alert("Completa ticker, acciones y precio.");
    addTxn({
      type: f.type, ticker: f.ticker.toUpperCase().trim(), industry: f.industry.trim(),
      shares: Number(f.shares), price: Number(f.price), fee: Number(f.fee || 0), date: f.date,
    });
    setF({ type: "buy", ticker: "", industry: "", shares: "", price: "", fee: "", date: todayISO() });
  };
  const known = Object.keys(data.tickers);
  const txns = [...data.transactions].sort((a, b) => new Date(b.date) - new Date(a.date) || b.created - a.created);

  return (
    <div className="content">
      <div className="panel">
        <h3 className="panel-title">Registrar operación</h3>
        <div className="form-grid">
          <div className="field">
            <label>Tipo</label>
            <div className="seg">
              <button className={f.type === "buy" ? "on" : ""} onClick={() => set("type", "buy")}>Compra</button>
              <button className={f.type === "sell" ? "on sell" : ""} onClick={() => set("type", "sell")}>Venta</button>
            </div>
          </div>
          <div className="field"><label>Ticker</label><input list="tk" value={f.ticker} onChange={(e) => set("ticker", e.target.value)} placeholder="AAPL" />
            <datalist id="tk">{known.map((t) => <option key={t} value={t} />)}</datalist></div>
          <div className="field"><label>Industria (opcional)</label><input value={f.industry} onChange={(e) => set("industry", e.target.value)} placeholder="Tecnología" /></div>
          <div className="field"><label>Acciones</label><input type="number" step="0.0001" value={f.shares} onChange={(e) => set("shares", e.target.value)} placeholder="10" /></div>
          <div className="field"><label>Precio / acción</label><input type="number" step="0.01" value={f.price} onChange={(e) => set("price", e.target.value)} placeholder="150.00" /></div>
          <div className="field"><label>Comisión (opcional)</label><input type="number" step="0.01" value={f.fee} onChange={(e) => set("fee", e.target.value)} placeholder="0.00" /></div>
          <div className="field"><label>Fecha</label><input type="date" value={f.date} onChange={(e) => set("date", e.target.value)} /></div>
          <div className="field end"><button className="primary" onClick={submit}><PlusCircle size={16} /> Añadir</button></div>
        </div>
      </div>

      <div className="panel">
        <h3 className="panel-title">Historial de operaciones</h3>
        {txns.length ? (
          <div className="table-wrap">
            <table>
              <thead><tr><th>Fecha</th><th>Tipo</th><th>Ticker</th><th className="r">Acciones</th><th className="r">Precio</th><th className="r">Total</th><th></th></tr></thead>
              <tbody>
                {txns.map((t) => (
                  <tr key={t.id}>
                    <td className="mono">{t.date}</td>
                    <td><span className={"tag " + (t.type === "buy" ? "buy" : "sell")}>{t.type === "buy" ? "Compra" : "Venta"}</span></td>
                    <td className="mono b">{t.ticker}</td>
                    <td className="r mono">{fmtNum(t.shares)}</td>
                    <td className="r mono">{fmtUSD(t.price)}</td>
                    <td className="r mono">{fmtUSD(t.shares * t.price + (t.type === "buy" ? (t.fee || 0) : -(t.fee || 0)))}</td>
                    <td className="r"><button className="icon-btn" onClick={() => delTxn(t.id)}><Trash2 size={15} /></button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ) : <div className="mini-empty">Todavía no hay operaciones.</div>}
      </div>
    </div>
  );
}

/* ============================ pestaña: Efectivo ============================ */
function Efectivo({ data, addCash, delCash }) {
  const [f, setF] = useState({ type: "deposit", amount: "", date: todayISO(), note: "" });
  const set = (k, v) => setF((s) => ({ ...s, [k]: v }));
  const submit = () => {
    if (!f.amount) return alert("Indica un importe.");
    addCash({ type: f.type, amount: Number(f.amount), date: f.date, note: f.note.trim() });
    setF({ type: "deposit", amount: "", date: todayISO(), note: "" });
  };
  const list = [...data.cash].sort((a, b) => new Date(b.date) - new Date(a.date) || b.created - a.created);

  return (
    <div className="content">
      <div className="panel">
        <h3 className="panel-title">Movimiento de efectivo</h3>
        <div className="form-grid">
          <div className="field">
            <label>Tipo</label>
            <div className="seg seg3">
              <button className={f.type === "deposit" ? "on" : ""} onClick={() => set("type", "deposit")}>Depósito</button>
              <button className={f.type === "income" ? "on inc" : ""} onClick={() => set("type", "income")}>Ingreso</button>
              <button className={f.type === "withdrawal" ? "on sell" : ""} onClick={() => set("type", "withdrawal")}>Retiro</button>
            </div>
          </div>
          <div className="field"><label>Importe</label><input type="number" step="0.01" value={f.amount} onChange={(e) => set("amount", e.target.value)} placeholder="1000.00" /></div>
          <div className="field"><label>Fecha</label><input type="date" value={f.date} onChange={(e) => set("date", e.target.value)} /></div>
          <div className="field grow"><label>Nota (opcional)</label><input value={f.note} onChange={(e) => set("note", e.target.value)} placeholder="Transferencia desde el banco" /></div>
          <div className="field end"><button className="primary" onClick={submit}><PlusCircle size={16} /> Añadir</button></div>
        </div>
      </div>

      <div className="panel">
        <h3 className="panel-title">Historial de efectivo</h3>
        {list.length ? (
          <div className="table-wrap">
            <table>
              <thead><tr><th>Fecha</th><th>Tipo</th><th>Nota</th><th className="r">Importe</th><th></th></tr></thead>
              <tbody>
                {list.map((c) => {
                  const isOut = c.type === "withdrawal";
                  const labelTxt = c.type === "deposit" ? "Depósito" : c.type === "income" ? "Ingreso" : "Retiro";
                  return (
                    <tr key={c.id}>
                      <td className="mono">{c.date}</td>
                      <td><span className={"tag " + (isOut ? "sell" : "buy")}>{labelTxt}</span></td>
                      <td style={{ color: "var(--muted)" }}>{c.note || "—"}</td>
                      <td className="r mono" style={{ color: isOut ? "var(--red)" : "var(--green)" }}>{(isOut ? "-" : "+") + fmtUSD(c.amount).replace("-$", "$")}</td>
                      <td className="r"><button className="icon-btn" onClick={() => delCash(c.id)}><Trash2 size={15} /></button></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        ) : <div className="mini-empty">Registra tu primer depósito para empezar.</div>}
      </div>
    </div>
  );
}

/* ============================ pestaña: Ajustes ============================ */
function Ajustes({ data, setTicker, resetAll, exportJSON, importFirstrade }) {
  const tickers = Object.keys(data.tickers).sort();
  const onFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => importFirstrade(String(reader.result));
    reader.readAsText(file);
    e.target.value = "";
  };
  return (
    <div className="content">
      <div className="panel">
        <h3 className="panel-title"><Upload size={15} style={{ verticalAlign: "-2px", marginRight: 6 }} />Importar de Firstrade</h3>
        <p style={{ color: "var(--muted)", fontSize: 13, margin: "0 0 14px" }}>
          Sube el CSV que exportas desde Firstrade (History → Export). Se añaden solo los movimientos nuevos; los repetidos se ignoran.
        </p>
        <label className="ghost" style={{ cursor: "pointer" }}>
          <Upload size={15} /> Elegir archivo CSV
          <input type="file" accept=".csv,text/csv" onChange={onFile} style={{ display: "none" }} />
        </label>
      </div>
      <div className="panel">
        <h3 className="panel-title"><Tag size={15} style={{ verticalAlign: "-2px", marginRight: 6 }} />Industria y precio por ticker</h3>
        {tickers.length ? (
          <div className="table-wrap">
            <table>
              <thead><tr><th>Ticker</th><th>Industria</th><th className="r">Precio actual</th></tr></thead>
              <tbody>
                {tickers.map((t) => (
                  <tr key={t}>
                    <td className="mono b">{t}</td>
                    <td><input className="cell-input" defaultValue={data.tickers[t].industry || ""} placeholder="Sin clasificar" onBlur={(e) => setTicker(t, "industry", e.target.value)} /></td>
                    <td className="r"><input className="price-input mono" type="number" step="0.01" defaultValue={data.tickers[t].price ?? ""} onBlur={(e) => setTicker(t, "price", e.target.value === "" ? "" : Number(e.target.value))} /></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ) : <div className="mini-empty">Aún no hay tickers registrados.</div>}
      </div>

      <div className="panel">
        <h3 className="panel-title">Datos</h3>
        <p style={{ color: "var(--muted)", fontSize: 13, margin: "0 0 14px" }}>
          Tus datos se guardan automáticamente y siguen disponibles cada vez que abras esta herramienta.
        </p>
        <div className="row-btns">
          <button className="ghost" onClick={exportJSON}><Download size={15} /> Exportar copia (JSON)</button>
          <button className="danger" onClick={resetAll}><RefreshCw size={15} /> Borrar todo</button>
        </div>
      </div>
    </div>
  );
}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:1px solid var(--border)}
td{padding:10px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
.r{text-align:right}
.chip{background:var(--panel2);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:2px 8px;border-radius:6px}
.tag{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600}
.tag.buy{background:rgba(86,197,150,.15);color:var(--green)}
.tag.sell{background:rgba(229,112,139,.15);color:var(--red)}
.icon-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:6px;display:inline-flex}
.icon-btn:hover{color:var(--red);background:var(--panel2)}

.form-grid{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.field{display:flex;flex-direction:column;gap:5px;min-width:120px}
.field.grow{flex:1;min-width:200px}
.field.end{justify-content:flex-end}
.field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
input{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 11px;font-size:14px;font-family:inherit;outline:none;width:100%}
input:focus{border-color:var(--gold)}
.mono input,input.mono{font-family:ui-monospace,monospace}
.price-input{width:110px;text-align:right}
.cell-input{min-width:140px}

.seg{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.seg button{flex:1;background:var(--panel2);border:none;color:var(--muted);padding:9px 14px;font-size:13px;cursor:pointer;font-family:inherit}
.seg button.on{background:var(--green);color:#0F1115;font-weight:600}
.seg button.on.sell{background:var(--red)}
.seg button.on.inc{background:var(--gold)}

.primary{background:var(--gold);color:#0F1115;border:none;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:inherit}
.primary:hover{filter:brightness(1.08)}
.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px 16px;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:inherit}
.ghost:hover{border-color:var(--gold)}
.danger{background:transparent;color:var(--red);border:1px solid var(--red);border-radius:8px;padding:9px 16px;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:inherit}
.danger:hover{background:rgba(229,112,139,.12)}
.row-btns{display:flex;gap:10px;flex-wrap:wrap}

.empty{text-align:center;padding:60px 20px;display:flex;flex-direction:column;align-items:center;gap:8px}
.empty h3{margin:8px 0 0;font-size:18px}
.empty p{margin:0;color:var(--muted);max-width:420px;line-height:1.6}

.tip{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:12px;font-family:ui-monospace,monospace}
.tip-title{color:var(--text);font-weight:600;margin-bottom:3px;font-family:ui-sans-serif,system-ui}

@media(max-width:680px){
  .charts{grid-template-columns:1fr}
  .total-value{font-size:24px}
}
`;


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
